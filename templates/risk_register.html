<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Register · CRACMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- ============ Sidebar ============ -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">CRACMS</span>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link" data-page="dashboard"><span class="nav-icon">▣</span>Dashboard</a>
        <a href="/risk-register" class="nav-link" data-page="risk-register"><span class="nav-icon">▤</span>Risk Register</a>
        <a href="/compliance" class="nav-link" data-page="compliance"><span class="nav-icon">▥</span>Compliance</a>
        <a href="/audit-findings" class="nav-link" data-page="audit-findings"><span class="nav-icon">▦</span>Audit Findings</a>
      </nav>
      <div class="sidebar-footer">
        <span class="status-dot"></span>
        <span class="status-text">Local instance</span>
      </div>
    </aside>

    <!-- ============ Main ============ -->
    <main class="main">
      <div class="topbar" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap: wrap; gap: 14px;">
        <div>
          <p class="eyebrow">[ RISK REGISTER ]</p>
          <h1>Identified Risks</h1>
          <p class="subtitle">Likelihood × Impact scoring against a standard 5×5 matrix.</p>
        </div>
        <button class="btn btn-primary" id="btn-add-risk">+ Add Risk</button>
      </div>

      <div class="card">
        <div class="filters-bar">
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option>Open</option>
            <option>Mitigated</option>
            <option>Accepted</option>
            <option>Closed</option>
          </select>
          <select id="filter-level">
            <option value="">All Risk Levels</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>
          </select>
          <select id="filter-category">
            <option value="">All Categories</option>
          </select>
          <button class="btn btn-sm" id="btn-clear-filters">Clear filters</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Risk</th>
                <th>Category</th>
                <th>L × I</th>
                <th>Score</th>
                <th>Level</th>
                <th>Owner</th>
                <th>Status</th>
                <th>Review Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="risk-table-body">
              <tr><td colspan="10" class="empty-state">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ============ Add / Edit Risk Modal ============ -->
  <div class="modal-overlay" id="risk-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="risk-modal-title">Add Risk</h3>
        <button class="btn-ghost" onclick="closeModal('risk-modal')">✕</button>
      </div>
      <form id="risk-form">
        <input type="hidden" id="risk-id" />
        <div class="modal-body">
          <div class="field-group">
            <label for="risk-title">Title *</label>
            <input type="text" id="risk-title" required maxlength="150" placeholder="e.g. Unpatched VPN gateway" />
          </div>

          <div class="field-group">
            <label for="risk-description">Description</label>
            <textarea id="risk-description" placeholder="What is the risk and why does it matter?"></textarea>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="risk-category">Category</label>
              <select id="risk-category">
                <option value="">— None —</option>
              </select>
            </div>
            <div class="field-group">
              <label for="risk-asset">Asset Affected</label>
              <input type="text" id="risk-asset" placeholder="e.g. Customer database" />
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="risk-likelihood">Likelihood (1–5) *</label>
              <select id="risk-likelihood" required>
                <option value="1">1 — Rare</option>
                <option value="2">2 — Unlikely</option>
                <option value="3" selected>3 — Possible</option>
                <option value="4">4 — Likely</option>
                <option value="5">5 — Almost Certain</option>
              </select>
            </div>
            <div class="field-group">
              <label for="risk-impact">Impact (1–5) *</label>
              <select id="risk-impact" required>
                <option value="1">1 — Negligible</option>
                <option value="2">2 — Minor</option>
                <option value="3" selected>3 — Moderate</option>
                <option value="4">4 — Major</option>
                <option value="5">5 — Severe</option>
              </select>
            </div>
          </div>

          <div class="score-preview">
            <span>Calculated score:</span>
            <span class="score-number" id="score-preview-number">9</span>
            <span id="score-preview-badge"></span>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="risk-owner">Owner</label>
              <input type="text" id="risk-owner" placeholder="e.g. IT Infrastructure Team" />
            </div>
            <div class="field-group">
              <label for="risk-status">Status</label>
              <select id="risk-status">
                <option>Open</option>
                <option>Mitigated</option>
                <option>Accepted</option>
                <option>Closed</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label for="risk-treatment">Treatment Plan</label>
            <textarea id="risk-treatment" placeholder="How is this risk being addressed?"></textarea>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="risk-identified-date">Identified Date</label>
              <input type="date" id="risk-identified-date" />
            </div>
            <div class="field-group">
              <label for="risk-review-date">Next Review Date</label>
              <input type="date" id="risk-review-date" />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeModal('risk-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-risk">Save Risk</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script src="/static/js/risk.js"></script>
</body>
</html>
